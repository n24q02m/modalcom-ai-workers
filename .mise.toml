[tools]
python = "3.13"
uv = "latest"

[tasks.setup]
description = "Setup development environment"
run = [
  "mise install",
  "uv sync --group dev",
  "uv pip install pre-commit",
  "uv run pre-commit install",
  "uv run pre-commit install --hook-type commit-msg",
  "echo 'Setup complete!'"
]

[tasks.lint]
description = "Run all quality checks (ruff + ty)"
run = [
  "uv run ruff check .",
  "uv run ruff format --check .",
  "uv run ty check",
]

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.fix]
description = "Auto-fix formatting and linting issues"
run = [
  "uv run ruff check --fix .",
  "uv run ruff format .",
]

[tasks.deploy]
description = "Deploy a single worker"
run = "uv run python -m ai_workers deploy"

[tasks.deploy-all]
description = "Deploy all workers"
run = "uv run python -m ai_workers deploy --all"

[tasks.onnx-convert]
description = "Convert model to ONNX format"
run = "uv run python -m ai_workers onnx-convert"

[tasks.gguf-convert]
description = "Convert model to GGUF format"
run = "uv run python -m ai_workers gguf-convert"
