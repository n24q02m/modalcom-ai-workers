[tools]
python = "3.13"
uv = "latest"

[tasks.setup]
description = "Setup development environment"
run = [
  "mise install",
  "uv sync --extra dev",
  "uv pip install pre-commit",
  "uv run pre-commit install",
  "echo 'Setup complete!'"
]

[tasks.lint]
description = "Run all quality checks (ruff + ty)"
run = [
  "uv run ruff check .",
  "uv run ruff format --check .",
  "uv run ty check",
]

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.fix]
description = "Auto-fix formatting and linting issues"
run = [
  "uv run ruff check --fix .",
  "uv run ruff format .",
]

[tasks.convert]
description = "Convert HuggingFace model to SafeTensors"
run = "uv run python -m ai_workers.cli convert"

[tasks.upload]
description = "Upload converted model to CF R2"
run = "uv run python -m ai_workers.cli upload"

[tasks.deploy]
description = "Deploy worker to Modal.com"
run = "uv run python -m ai_workers.cli deploy"

[tasks.deploy-all]
description = "Deploy all workers to Modal.com"
run = "uv run python -m ai_workers.cli deploy --all"
