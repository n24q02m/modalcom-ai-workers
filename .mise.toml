[tools]
python = "3.13"
uv = "latest"
infisical = "latest"

[tasks.setup]
description = "Setup development environment"
run = [
  "mise install",
  "uv sync --all-groups",
  "uv run pre-commit install",
  "echo 'Setup complete!'"
]

[tasks.lint]
description = "Run all quality checks (ruff + ty)"
run = [
  "uv run ruff check .",
  "uv run ruff format --check .",
  "uv run ty check",
]

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.fix]
description = "Auto-fix formatting and linting issues"
run = [
  "uv run ruff check --fix .",
  "uv run ruff format .",
]

[tasks.convert]
description = "[DEPRECATED] Convert HuggingFace model to SafeTensors → R2 (workers giờ tải từ HF Hub)"
run = "infisical run --env=prod -- uv run python -m ai_workers convert"

[tasks.upload]
description = "[DEPRECATED] Upload converted model to CF R2"
run = "infisical run --env=prod -- uv run python -m ai_workers upload"

[tasks.deploy]
description = "Deploy worker to Modal.com"
run = "infisical run --env=prod -- uv run python -m ai_workers deploy"

[tasks.deploy-all]
description = "Deploy all workers to Modal.com"
run = "infisical run --env=prod -- uv run python -m ai_workers deploy --all"

[tasks.onnx-convert]
description = "Convert HuggingFace model to ONNX (INT8 + Q4F16) and push to HF Hub (Modal CPU)"
run = "infisical run --env=prod -- uv run python -m ai_workers onnx-convert"

[tasks.gguf-convert]
description = "Convert HuggingFace model to GGUF Q4_K_M and push to HF Hub (Modal CPU)"
run = "infisical run --env=prod -- uv run python -m ai_workers gguf-convert"
