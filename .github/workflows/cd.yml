name: CD

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - beta
          - stable
      force_deploy:
        description: "Force deploy all workers (skip release)"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Release: Python Semantic Release
  # ============================================================================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: python-semantic-release/python-semantic-release@v10
        id: release
        with:
          github_token: ${{ secrets.GH_PAT }}
          prerelease: ${{ inputs.release_type == 'beta' }}
          prerelease_token: beta

      - uses: python-semantic-release/publish-action@v10
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GH_PAT }}
          tag: ${{ steps.release.outputs.tag }}

  # ============================================================================
  # Deploy Workers to Modal.com
  # ============================================================================
  deploy-workers:
    name: Deploy Workers to Modal.com
    runs-on: ubuntu-latest
    needs: release
    if: |
      always() && !cancelled() &&
      (needs.release.outputs.released == 'true' || inputs.force_deploy)
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev --extra deploy

      - name: Deploy all workers
        run: uv run python -m ai_workers deploy --all
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Summary
        run: |
          echo "## Workers Deployed to Modal.com" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ needs.release.outputs.version || 'force-deploy' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- All workers deployed via \`ai_workers deploy --all\`" >> $GITHUB_STEP_SUMMARY
