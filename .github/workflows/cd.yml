name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'src/ai_workers/workers/**'
      - 'src/ai_workers/common/**'

  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker module to deploy (e.g. embedding, reranker, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - embedding
          - reranker
          - vl_embedding
          - vl_reranker
          - ocr
          - asr

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Setup Modal
        run: |
          uv run modal token set \
            --token-id ${{ secrets.MODAL_TOKEN_ID }} \
            --token-secret ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Detect changed workers
        if: github.event_name == 'push'
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- src/ai_workers/workers/ | xargs -I{} basename {} .py | sort -u | tr '\n' ' ')
          COMMON_CHANGED=$(git diff --name-only HEAD~1 HEAD -- src/ai_workers/common/ | wc -l)
          if [ "$COMMON_CHANGED" -gt 0 ]; then
            echo "workers=all" >> "$GITHUB_OUTPUT"
          else
            echo "workers=$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy workers
        run: |
          WORKER="${{ github.event.inputs.worker || steps.changes.outputs.workers || 'all' }}"

          if [ "$WORKER" = "all" ]; then
            echo "Deploying ALL workers..."
            uv run python -m ai_workers deploy --all
          else
            for w in $WORKER; do
              echo "Deploying worker module: $w"
              uv run modal deploy "src/ai_workers/workers/${w}.py"
            done
          fi
