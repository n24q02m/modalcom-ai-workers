name: CD

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - beta
          - stable
      force_deploy:
        description: "Force deploy all workers (skip release)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Release: Python Semantic Release
  # ============================================================================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is-prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GH_PAT }}
          prerelease: ${{ inputs.release_type == 'beta' }}
          prerelease_token: beta

      - name: Publish to GitHub Release
        uses: python-semantic-release/publish-action@v10
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GH_PAT }}
          tag: ${{ steps.release.outputs.tag }}

  # ============================================================================
  # Deploy Workers to Modal.com
  # ============================================================================
  deploy-workers:
    name: Deploy Workers to Modal.com
    runs-on: ubuntu-latest
    needs: release
    if: |
      always() && !cancelled() &&
      (needs.release.outputs.released == 'true' || inputs.force_deploy)
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'

      # Note: CD pipeline uses Infisical for secrets injection.
      # Fork contributors: set HF_TOKEN, MODAL_TOKEN_ID, MODAL_TOKEN_SECRET as GitHub repo secrets instead.
      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y infisical

      - name: Setup project
        run: |
          uv sync --all-groups

      - name: Deploy all workers
        run: infisical run --env=prod -- uv run python -m ai_workers deploy --all
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}

      - name: Summary
        run: |
          echo "## Workers Deployed to Modal.com" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ needs.release.outputs.version || 'force-deploy' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- All workers deployed via \`ai_workers deploy --all\`" >> $GITHUB_STEP_SUMMARY
